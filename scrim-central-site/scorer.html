<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Scorers Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050608; }
        .font-gaming { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.06em; }
        .font-header { font-family: 'Orbitron', sans-serif; letter-spacing: 0.08em; }
        .premium-gradient { background: radial-gradient(circle at top right, rgba(220, 38, 38, 0.12), transparent 50%), radial-gradient(circle at bottom left, rgba(17, 24, 39, 0.85), #050608); }
    </style>
</head>
<body class="text-white antialiased premium-gradient min-h-screen flex flex-col justify-between relative">

    <header class="border-b border-gray-900 bg-[#0a0c10]/95 backdrop-blur-md sticky top-0 z-40 px-4 sm:px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center relative">
            <a href="index" class="flex items-center space-x-2">
                <span class="text-red-500 text-2xl font-black tracking-wider font-header flex items-center gap-2">
                    <span class="text-white bg-gradient-to-r from-purple-600 to-pink-500 px-2 py-0.5 rounded text-xs font-black italic">UV</span>
                    UV<span class="text-white font-medium">ESPORTS</span>
                </span>
            </a>
            <span class="text-xs font-gaming text-purple-400 uppercase tracking-widest font-bold border border-purple-900/50 bg-purple-950/20 px-3 py-1 rounded">Scorers Desk</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-12 w-full flex-grow flex flex-col justify-center relative z-10">
        <div class="bg-[#0a0c10] border border-gray-800 rounded-2xl p-6 sm:p-8 shadow-2xl space-y-6">
            <div class="border-l-4 border-purple-500 pl-3">
                <p class="text-xs font-gaming text-purple-400 uppercase tracking-widest font-bold">Operational Utility</p>
                <h2 class="text-xl font-header font-black uppercase text-white">Points Calculator</h2>
            </div>
            
            <div class="space-y-4 font-gaming text-xs">
                <div>
                    <label class="block text-gray-400 uppercase font-bold mb-1">Placement Rank</label>
                    <select id="calcRank" class="w-full bg-black border border-gray-800 text-white p-3 rounded focus:outline-none focus:border-purple-500 text-sm font-bold tracking-wider">
                        <!-- JavaScript will auto-load all 12 ranks here instantly -->
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-400 uppercase font-bold mb-1">Kill Count</label>
                    <input type="number" id="calcKills" min="0" value="0" class="w-full bg-black border border-gray-800 text-white p-3 rounded focus:outline-none focus:border-purple-500 text-sm font-bold tracking-wider">
                </div>

                <button onclick="calculateTotalPoints()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-header font-black py-3 rounded uppercase tracking-wider text-xs shadow-md transition">Calculate Total</button>

                <div id="resultBox" class="hidden border border-purple-900/50 bg-purple-950/10 p-4 rounded text-center space-y-1">
                    <p class="text-gray-400 uppercase tracking-widest text-[10px]">Calculated Outcome</p>
                    <p id="totalPointsDisplay" class="text-2xl font-header font-black text-purple-400">00 PTS</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-950 bg-[#030406] py-4 px-6 w-full text-center">
        <p class="text-[9px] tracking-widest font-header text-gray-600 uppercase">&copy; 2026 UV ESPORTS</p>
    </footer>

    <script>
        // Official Free Fire Punch Table mapping for all 12 places
        const officialPointsTable = {
            1: { name: "1st Place (Booyah)", pts: 12 },
            2: { name: "2nd Place", pts: 9 },
            3: { name: "3rd Place", pts: 8 },
            4: { name: "4th Place", pts: 7 },
            5: { name: "5th Place", pts: 6 },
            6: { name: "6th Place", pts: 5 },
            7: { name: "7th Place", pts: 4 },
            8: { name: "8th Place", pts: 3 },
            9: { name: "9th Place", pts: 2 },
            10: { name: "10th Place", pts: 1 },
            11: { name: "11th Place", pts: 0 },
            12: { name: "12th Place", pts: 0 }
        };

        // Inject options into select tag smoothly
        const selectMenu = document.getElementById('calcRank');
        Object.keys(officialPointsTable).forEach(rank => {
            let option = document.createElement('option');
            option.value = officialPointsTable[rank].pts;
            option.textContent = `${officialPointsTable[rank].name} [${officialPointsTable[rank].pts} Pts]`;
            selectMenu.appendChild(option);
        });

        function calculateTotalPoints() {
            const placementPts = parseInt(document.getElementById('calcRank').value) || 0;
            const killCount = parseInt(document.getElementById('calcKills').value) || 0;
            
            // 1 kill = 1 point format standard
            const total = placementPts + killCount;
            
            document.getElementById('totalPointsDisplay').textContent = `${total < 10 ? '0' + total : total} TOTAL PTS`;
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
