<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Daily Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050608; color: white; font-family: sans-serif; }
        .card-bg { background-color: #0a0c10; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Header -->
    <div class="max-w-4xl mx-auto mb-8 border-l-4 border-red-600 pl-4">
        <h1 class="text-3xl font-bold uppercase">Daily Results</h1>
        <p class="text-gray-400">View latest tournament and scrim standings.</p>
    </div>

    <!-- Results Container -->
    <main class="max-w-4xl mx-auto">
        
        <!-- Single Match Result Card -->
        <div class="card-bg rounded-xl p-6 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-xl font-bold text-red-500">Comeback Cup - Grand Finals</h2>
                    <span class="text-xs text-gray-500 uppercase tracking-widest">Date: 28 June 2026</span>
                </div>
                <span class="bg-red-900/30 text-red-500 px-3 py-1 rounded text-xs font-bold">COMPLETED</span>
            </div>
            
            <div class="rounded-lg overflow-hidden border border-gray-800 mb-4">
                <img src="result1.jpg" alt="Match Result" class="w-full h-auto" onerror="this.src='https://placehold.co/800x400?text=Result+Image+Pending'">
            </div>
            
            <!-- Download Button -->
            <a href="result1.jpg" download="Comeback_Cup_Results.jpg" class="block text-center w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded transition">
                Download Result
            </a>
        </div>

    </main>

</body>
</html>
