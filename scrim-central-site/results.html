<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050608; color: #a1a1aa; font-family: sans-serif; }
        .result-card { background-color: #0a0c10; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- Match Header -->
        <div class="mb-6 border-l-4 border-blue-600 pl-4">
            <h1 class="text-2xl font-bold text-white uppercase">T3 PRO SCRIMS</h1>
            <p class="text-blue-500 font-bold uppercase text-xs">Overall Standings</p>
        </div>

        <!-- Standings Table -->
        <div class="result-card rounded-xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs uppercase">
                    <thead class="bg-[#111319] text-gray-400">
                        <tr>
                            <th class="p-4">RK</th>
                            <th class="p-4">Team Name</th>
                            <th class="p-4 text-center">MP</th>
                            <th class="p-4 text-center">KP</th>
                            <th class="p-4 text-center">W</th>
                            <th class="p-4 text-center text-blue-500">Pts</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-800 text-white">
                        <!-- Row 1 -->
                        <tr class="hover:bg-gray-900/50">
                            <td class="p-4 font-bold">01</td>
                            <td class="p-4 font-bold">GENERATIONAL R...</td>
                            <td class="p-4 text-center">3</td>
                            <td class="p-4 text-center">48</td>
                            <td class="p-4 text-center">1</td>
                            <td class="p-4 text-center font-bold text-blue-500">74</td>
                        </tr>
                        <!-- Row 2 -->
                        <tr class="hover:bg-gray-900/50">
                            <td class="p-4 font-bold">02</td>
                            <td class="p-4 font-bold">MULTIVERSE X</td>
                            <td class="p-4 text-center">3</td>
                            <td class="p-4 text-center">39</td>
                            <td class="p-4 text-center">1</td>
                            <td class="p-4 text-center font-bold text-blue-500">62</td>
                        </tr>
                        <!-- Row 3 -->
                        <tr class="hover:bg-gray-900/50">
                            <td class="p-4 font-bold">03</td>
                            <td class="p-4 font-bold">SHOWMANS ESP</td>
                            <td class="p-4 text-center">3</td>
                            <td class="p-4 text-center">29</td>
                            <td class="p-4 text-center">0</td>
                            <td class="p-4 text-center font-bold text-blue-500">56</td>
                        </tr>
                    </tbody>
                    <script>
    // Apni published CSV link yahan daalo
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9URLV1svEykn17Ehr90HfUr0NxNiXfMoy81-c1Mj94IkSs8Z8hIrnc9Kr5ezXM08VHAcey9N9u-Yh/pub?output=csv';

    fetch(sheetUrl)
        .then(res => res.text())
        .then(data => {
            const rows = data.split('\n').slice(1);
            let html = '';
            rows.forEach(row => {
                const cols = row.split(',');
                html += `<tr>
                    <td class="p-4 font-bold">${cols[0]}</td>
                    <td class="p-4 font-bold">${cols[1]}</td>
                    <td class="p-4 text-center">${cols[2]}</td>
                    <td class="p-4 text-center">${cols[3]}</td>
                    <td class="p-4 text-center">${cols[4]}</td>
                    <td class="p-4 text-center font-bold text-blue-500">${cols[5]}</td>
                </tr>`;
            });
            document.querySelector('tbody').innerHTML = html;
        });
</script>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
