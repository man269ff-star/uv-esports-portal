<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Battle Results Live Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050608; }
        .font-gaming { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.06em; }
        .font-header { font-family: 'Orbitron', sans-serif; letter-spacing: 0.08em; }
        .premium-gradient { background: radial-gradient(circle at top right, rgba(220, 38, 38, 0.12), transparent 50%), radial-gradient(circle at bottom left, rgba(17, 24, 39, 0.85), #050608); }
    </style>
</head>
<body class="text-white antialiased premium-gradient min-h-screen flex flex-col justify-between relative">

    <header class="border-b border-gray-900 bg-[#0a0c10]/95 backdrop-blur-md sticky top-0 z-40 px-4 sm:px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center relative">
            <a href="index" class="flex items-center space-x-2 focus:outline-none">
                <span class="text-red-500 text-2xl font-black tracking-wider font-header flex items-center gap-2">
                    <span class="text-white bg-gradient-to-r from-purple-600 to-pink-500 px-2 py-0.5 rounded text-xs font-black italic">UV</span>
                    UV<span class="text-white font-medium">ESPORTS</span>
                </span>
            </a>
            <nav class="hidden md:flex space-x-6 lg:space-x-8 font-gaming text-sm tracking-widest text-gray-400">
                <a href="index" class="hover:text-white transition uppercase font-bold">Home</a>
                <a href="tournaments" class="hover:text-white transition uppercase font-bold">Tournaments</a>
                <a href="scrims" class="hover:text-white transition uppercase font-bold">Scrims</a>
                <a href="results" class="text-white border-b-2 border-red-500 pb-1 uppercase font-bold">Results</a>
                <a href="leaderboard" class="hover:text-white transition uppercase font-bold">Leaderboard</a>
                <a href="register" class="hover:text-white transition uppercase font-bold">Register</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12 space-y-10 w-full flex-grow relative z-10">
        
        <div class="border-l-4 border-red-500 pl-3">
            <p class="text-xs font-gaming text-red-500 uppercase tracking-widest font-bold">Archive Desk</p>
            <h1 class="text-2xl font-black font-header text-white uppercase">Match Standings & Graphics</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-[#0a0c10] border border-gray-900 rounded-2xl p-4 space-y-4 shadow-xl">
                <div class="flex justify-between items-center font-gaming">
                    <div>
                        <h3 class="text-base font-black font-header text-white uppercase">Comeback Cup - Grand Finals</h3>
                        <p class="text-[10px] text-gray-500">Overall Points Table Standings</p>
                    </div>
                    <span class="bg-purple-950 text-purple-400 border border-purple-900/60 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Tournament</span>
                </div>
                <div class="relative aspect-video w-full rounded-lg overflow-hidden border border-gray-950 bg-black/40 shadow-inner">
                    <img src="https://i.imgur.com/8m4Qk8p.png" alt="Esports Points Table Graphic" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="bg-[#0a0c10] border border-gray-900 rounded-2xl p-4 space-y-4 shadow-xl">
                <div class="flex justify-between items-center font-gaming">
                    <div>
                        <h3 class="text-base font-black font-header text-white uppercase">Daily Scrims - Match 01</h3>
                        <p class="text-[10px] text-gray-500">Bermuda Winner Showcase</p>
                    </div>
                    <span class="bg-red-950 text-red-400 border border-red-900/60 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Daily Scrims</span>
                </div>
                <div class="relative aspect-video w-full rounded-lg overflow-hidden border border-gray-950 bg-black/40 shadow-inner">
                    <img src="https://i.imgur.com/Y6K8VbM.png" alt="Match Winner Graphic" class="w-full h-full object-cover">
                </div>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-950 bg-[#030406] py-6 px-6 w-full relative z-10 text-center">
        <p class="text-[9px] tracking-widest font-header text-gray-600 uppercase">&copy; 2026 UV ESPORTS &bull; POWERED BY UNDERDOGS KI TOLI</p>
    </footer>

</body>
</html>
