<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Live Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050608; color: #fff; font-family: sans-serif; }
        .card-bg { background-color: #0a0c10; border: 1px solid #1f2937; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="mb-8 border-l-4 border-red-600 pl-4">
            <h1 class="text-3xl font-bold uppercase tracking-wider">T3 PRO SCRIMS</h1>
            <p class="text-gray-400 text-sm">Overall Live Standings</p>
        </div>

        <!-- PODIUM SECTION -->
        <div id="podium" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <!-- Data load hoga -->
        </div>

        <!-- TABLE SECTION -->
        <div class="card-bg rounded-xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs uppercase">
                    <thead class="bg-[#111319] text-gray-400">
                        <tr>
                            <th class="p-4">RK</th>
                            <th class="p-4">Team Name</th>
                            <th class="p-4 text-center">MP</th>
                            <th class="p-4 text-center">KP</th>
                            <th class="p-4 text-center">W</th>
                            <th class="p-4 text-center text-red-500">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-800 text-white">
                        <!-- Data load hoga -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9URLV1svEykn17Ehr90HfUr0NxNiXfMoy81-c1Mj94IkSs8Z8hIrnc9Kr5ezXM08VHAcey9N9u-Yh/pub?output=csv';

        fetch(sheetUrl)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').filter(row => row.trim() !== '').slice(1);
                
                // Podium Logic
                const top3 = rows.slice(0, 3);
                const podiumDiv = document.getElementById('podium');
                top3.forEach((row, index) => {
                    const cols = row.split(',');
                    podiumDiv.innerHTML += `
                        <div class="card-bg p-4 rounded-xl border-t-4 border-red-600 text-center">
                            <div class="text-2xl font-black text-gray-600">0${index + 1}</div>
                            <div class="font-bold text-lg truncate">${cols[1]}</div>
                            <div class="text-red-500 font-bold text-xl">${cols[5]} PTS</div>
                        </div>
                    `;
                });

                // Table Logic
                const tableBody = document.getElementById('table-body');
                const rest = rows.slice(3);
                rest.forEach(row => {
                    const cols = row.split(',');
                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-900/50">
                            <td class="p-4 font-bold">${cols[0]}</td>
                            <td class="p-4 font-bold">${cols[1]}</td>
                            <td class="p-4 text-center">${cols[2]}</td>
                            <td class="p-4 text-center">${cols[3]}</td>
                            <td class="p-4 text-center">${cols[4]}</td>
                            <td class="p-4 text-center font-bold text-red-500">${cols[5]}</td>
                        </tr>
                    `;
                });
            });
    </script>
</body>
</html>
