<!DOCTYPE html>

<body class="text-white antialiased premium-gradient min-h-screen flex flex-col justify-between">

    <!-- Same Navbar -->

        <div class="max-w-7xl mx-auto flex justify-between items-center">

                    <label class="block text-xs font-header font-bold text-gray-400 uppercase mb-1">Official Clan Name</label>

                </div>
                <div>
                    <label class="block text-xs font-header font-bold text-gray-400 uppercase mb-1">Leader WhatsApp</label>
                    <input type="tel" required placeholder="10 Digit Number" class="w-full bg-[#050608] border border-gray-800 rounded px-4 py-3 text-white focus:outline-none focus:border-red-500 text-sm">
                </div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-header font-black py-3.5 rounded-xl text-xs uppercase tracking-wider shadow-lg transition">SUBMIT ROSTER</button>
