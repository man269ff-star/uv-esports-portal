<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV ESPORTS | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050608; }
        .font-gaming { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.06em; }
        .font-header { font-family: 'Orbitron', sans-serif; letter-spacing: 0.08em; }
        .premium-gradient { background: radial-gradient(circle at top right, rgba(220, 38, 38, 0.12), transparent 50%), radial-gradient(circle at bottom left, rgba(17, 24, 39, 0.85), #050608); }
    </style>
</head>
<body class="text-white antialiased premium-gradient min-h-screen flex flex-col justify-between">

    <!-- Same Navbar -->
    <nav class="border-b border-gray-900 bg-[#0a0c10]/95 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <img src="https://i.ibb.co/6wGZffm/uv-logo.png" alt="UV ESPORTS LOGO" class="h-9 w-auto object-contain bg-transparent">
            </a>
            <div class="hidden md:flex space-x-8 font-gaming text-sm tracking-widest text-gray-400">
                <a href="index.html" class="hover:text-white transition uppercase font-bold">Arena</a>
                <a href="leaderboard.html" class="text-white border-b-2 border-red-500 pb-1 uppercase font-bold">Leaderboard</a>
                <a href="register.html" class="hover:text-white transition uppercase font-bold">Register</a>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="alert('🔒 Protection Active')" class="border border-gray-700 hover:border-red-500 text-gray-300 hover:text-white text-xs font-header font-bold tracking-wider px-4 py-2.5 rounded transition">SQUAD LOGIN</button>
            </div>
        </div>
    </nav>

    <!-- Leaderboard Core Table -->
    <main class="max-w-7xl mx-auto px-6 py-12 w-full space-y-6">
        <h2 class="text-3xl font-header font-black uppercase tracking-wider border-l-4 border-red-500 pl-3">Scrim Standings</h2>
        <div class="bg-[#0a0c10] border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#111319] border-b border-gray-800 text-xs font-header font-black uppercase tracking-wider text-gray-400">
                        <th class="px-6 py-4">Rank</th>
                        <th class="px-6 py-4">Squad Name</th>
                        <th class="px-6 py-4 text-center">Matches</th>
                        <th class="px-6 py-4 text-center text-red-500">Total Points</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-900 text-base font-bold font-gaming">
                    <tr class="hover:bg-gray-900/40 transition">
                        <td class="px-6 py-4 font-header font-black text-xl text-yellow-500"># 01</td>
                        <td class="px-6 py-4 text-white text-lg font-header">UVx4OPERATORS</td>
                        <td class="px-6 py-4 text-center text-gray-400">05</td>
                        <td class="px-6 py-4 text-center text-red-500 text-2xl font-header">83</td>
                    </tr>
                    <tr class="hover:bg-gray-900/40 transition">
                        <td class="px-6 py-4 font-header font-black text-xl text-gray-400"># 02</td>
                        <td class="px-6 py-4 text-white text-lg font-header">TEAM INFERNO</td>
                        <td class="px-6 py-4 text-center text-gray-400">05</td>
                        <td class="px-6 py-4 text-center text-red-500 text-2xl font-header">58</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Same Footer -->
    <footer class="border-t border-gray-900 bg-[#06070a] py-6 text-center text-xs text-gray-500 w-full">
        <p>&copy; 2026 UV ESPORTS. Managed by Underdogs Ki Toli.</p>
    </footer>
</body>
</html>
